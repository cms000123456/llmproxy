global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional - uncomment if you have Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load alerting rules
rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'llmproxy'
    static_configs:
      - targets: ['172.28.0.1:8080']
    metrics_path: '/metrics/prometheus'
    scrape_interval: 5s
