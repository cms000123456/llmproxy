# Docker Compose for Observability Stack
# Prometheus + Grafana (metrics) + Jaeger (tracing)
# 
# Usage:
#   docker-compose -f docker-compose.monitoring.yml up -d
#
# Access:
#   - Prometheus: http://localhost:9091
#   - Grafana: http://localhost:3002 (admin/admin)
#   - Jaeger UI: http://localhost:16686
#   - LLM Proxy Metrics: http://localhost:8080/metrics/prometheus

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: llmproxy-prometheus
    ports:
      - "${PROMETHEUS_PORT_MAPPING:-9091:9090}"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - llmproxy-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: llmproxy-grafana
    ports:
      - "${GRAFANA_PORT_MAPPING:-3002:3000}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - llmproxy-net
    restart: unless-stopped
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: llmproxy-jaeger
    ports:
      - "${JAEGER_UI_PORT_MAPPING:-16686:16686}"  # Jaeger UI
      - "${JAEGER_OTLP_PORT_MAPPING:-4318:4318}"    # OTLP HTTP receiver (for traces)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - llmproxy-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  llmproxy-net:
    external: true
