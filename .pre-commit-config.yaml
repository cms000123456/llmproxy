# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python code formatting and linting (ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  # Python type checking (mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-tiktoken
          - pydantic
          - pydantic-settings
        args: [--ignore-missing-imports, --show-error-codes]
        exclude: ^(tests/|scripts/)

  # Security scanning (bandit)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-f', 'json', '-o', '/dev/null']
        additional_dependencies: ['bandit[toml]']

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.1-beta
    hooks:
      - id: hadolint-docker
        args: ['--ignore', 'DL3008', '--ignore', 'DL3013']

  # Docker Compose validation
  - repo: https://github.com/iamthefij/docker-pre-commit
    rev: v3.0.1
    hooks:
      - id: docker-compose-check
        files: docker-compose.*\.ya?ml$

  # Shell script checking
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ['-x', '--severity=warning']
        files: \.(sh|bash)$

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix', '--ignore', 'CHANGELOG.md']
        exclude: ^(\.github/|LICENSE)$

  # GitHub Actions workflow validation
  - repo: https://github.com/rhysd/actionlint
    rev: v1.6.26
    hooks:
      - id: actionlint
        files: ^\.github/workflows/

  # Secrets scanning (git-secrets alternative)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(\.git/|\.pre-commit-config\.yaml|poetry\.lock)$

  # Local hooks (project-specific)
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: python -m pytest tests/ -x -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]

      - id: check-version
        name: Check version consistency
        entry: python -c "import re; f=open('pyproject.toml'); v1=re.search(r'version = \"([^\"]+)\"', f.read()).group(1); f=open('llmproxy/__init__.py'); v2=re.search(r'__version__ = \"([^\"]+)\"', f.read()).group(1); assert v1==v2, f'Version mismatch: pyproject.toml={v1}, __init__.py={v2}'"
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|llmproxy/__init__\.py)$
