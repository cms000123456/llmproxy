# Docker Compose for Local Development
# Includes: LLM Proxy, Ollama, Redis, Jaeger (tracing), Prometheus/Grafana (metrics)

services:
  # Main LLM Proxy service
  llmproxy:
    build: .
    container_name: llmproxy-dev
    ports:
      - "8080:8080"
    environment:
      # Upstream API
      - LLM_PROXY_UPSTREAM_BASE_URL=${LLM_PROXY_UPSTREAM_BASE_URL:-https://api.moonshot.cn/v1}
      - LLM_PROXY_UPSTREAM_API_KEY=${LLM_PROXY_UPSTREAM_API_KEY:-}
      
      # Features
      - LLM_PROXY_ENABLE_FILTERING=true
      - LLM_PROXY_ENABLE_COMPRESSION=true
      - LLM_PROXY_MAX_TOTAL_TOKENS=120000
      
      # Cache with Redis backend
      - LLM_PROXY_ENABLE_CACHE=true
      - LLM_PROXY_CACHE_BACKEND=redis
      - LLM_PROXY_REDIS_URL=redis://redis:6379
      - LLM_PROXY_CACHE_TTL_SECONDS=300
      
      # Ollama local LLM
      - LLM_PROXY_OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROXY_OLLAMA_MODEL=llama3.2
      - LLM_PROXY_OLLAMA_ENABLE_COMPRESSION=true
      
      # Logging
      - LLM_PROXY_LOG_LEVEL=DEBUG
      - LLM_PROXY_LOG_FORMAT=console
      
      # Cost tracking
      - LLM_PROXY_ENABLE_COST_TRACKING=true
      - LLM_PROXY_COST_STORAGE_PATH=data/cost_tracker.json
      
      # Authentication (optional - add your API keys)
      - LLM_PROXY_AUTH_ENABLED=false
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
      - redis
      - jaeger
    networks:
      - llmproxy-dev-net
    restart: unless-stopped

  # Ollama for local LLM tasks (summarization, etc.)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-dev
    volumes:
      - ollama-dev:/root/.ollama
    ports:
      - "11434:11434"  # Expose for direct access during development
    networks:
      - llmproxy-dev-net
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev:/data
    networks:
      - llmproxy-dev-net
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-dev
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
      - "6831:6831/udp"  # Jaeger agent compact thrift
      - "6832:6832/udp"  # Jaeger agent binary thrift
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - llmproxy-dev-net
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - llmproxy-dev-net
    restart: unless-stopped

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dev
    ports:
      - "3000:3000"
    volumes:
      - grafana-dev:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - llmproxy-dev-net
    restart: unless-stopped
    depends_on:
      - prometheus

  # Dashboard - React web UI
  dashboard:
    image: nginx:alpine
    container_name: dashboard-dev
    ports:
      - "3000:80"
    volumes:
      - ./dashboard/public:/usr/share/nginx/html:ro
    networks:
      - llmproxy-dev-net
    restart: unless-stopped
    depends_on:
      - llmproxy

networks:
  llmproxy-dev-net:
    driver: bridge

volumes:
  ollama-dev:
  redis-dev:
  prometheus-dev:
  grafana-dev:
