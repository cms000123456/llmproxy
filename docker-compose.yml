# Docker Compose for LLM Proxy
# Usage:
#   docker compose up -d                    # Core services only
#   docker compose --profile dev up -d      # Core + dev tools (Redis, full monitoring)
#   docker compose --profile monitoring up -d  # Add Prometheus/Grafana/Jaeger
#   docker compose --profile dashboard up -d   # Add web dashboard
#
# All service ports are configurable via .env file

services:
  # ============================================================================
  # CORE SERVICES (always started)
  # ============================================================================
  
  llmproxy:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: llmproxy
    ports:
      - "${LLM_PROXY_PORT_MAPPING:-8080:8080}"
    environment:
      - LLM_PROXY_UPSTREAM_BASE_URL=${LLM_PROXY_UPSTREAM_BASE_URL:-https://api.moonshot.cn/v1}
      - LLM_PROXY_UPSTREAM_API_KEY=${LLM_PROXY_UPSTREAM_API_KEY:-}
      - LLM_PROXY_ENABLE_FILTERING=${LLM_PROXY_ENABLE_FILTERING:-true}
      - LLM_PROXY_ENABLE_COMPRESSION=${LLM_PROXY_ENABLE_COMPRESSION:-true}
      - LLM_PROXY_MAX_TOTAL_TOKENS=${LLM_PROXY_MAX_TOTAL_TOKENS:-120000}
      - LLM_PROXY_ENABLE_CACHE=${LLM_PROXY_ENABLE_CACHE:-true}
      - LLM_PROXY_CACHE_BACKEND=${LLM_PROXY_CACHE_BACKEND:-memory}
      - LLM_PROXY_LOG_LEVEL=${LLM_PROXY_LOG_LEVEL:-INFO}
      - LLM_PROXY_AUTH_ENABLED=${LLM_PROXY_AUTH_ENABLED:-false}
      - LLM_PROXY_OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROXY_OLLAMA_MODEL=${LLM_PROXY_OLLAMA_MODEL:-llama3.2}
      - LLM_PROXY_OLLAMA_ENABLE_COMPRESSION=${LLM_PROXY_OLLAMA_ENABLE_COMPRESSION:-true}
    depends_on:
      ollama:
        condition: service_started
    networks:
      - llmproxy-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - proxy-data:/app/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_PORT_MAPPING:-11434:11434}"
    volumes:
      - ollama:/root/.ollama
    networks:
      - llmproxy-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "${SEARXNG_PORT_MAPPING:-8081:8080}"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-ultrasecretkey}
    volumes:
      - searxng-data:/etc/searxng
    networks:
      - llmproxy-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================================
  # MONITORING PROFILE (Prometheus + Grafana + Jaeger)
  # docker compose --profile monitoring up -d
  # ============================================================================
  
  prometheus:
    profiles: ["monitoring", "dev"]
    image: prom/prometheus:v2.48.0
    container_name: llmproxy-prometheus
    ports:
      - "${PROMETHEUS_PORT_MAPPING:-9091:9090}"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - llmproxy-net
    restart: unless-stopped

  grafana:
    profiles: ["monitoring", "dev"]
    image: grafana/grafana:10.2.3
    container_name: llmproxy-grafana
    ports:
      - "${GRAFANA_PORT_MAPPING:-3002:3000}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - llmproxy-net
    restart: unless-stopped
    depends_on:
      - prometheus

  jaeger:
    profiles: ["monitoring", "dev"]
    image: jaegertracing/all-in-one:latest
    container_name: llmproxy-jaeger
    ports:
      - "${JAEGER_UI_PORT_MAPPING:-16686:16686}"  # Jaeger UI
      - "${JAEGER_OTLP_PORT_MAPPING:-4318:4318}"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - llmproxy-net
    restart: unless-stopped

  # ============================================================================
  # DASHBOARD PROFILE (React web UI)
  # docker compose --profile dashboard up -d
  # ============================================================================
  
  dashboard:
    profiles: ["dashboard", "dev"]
    image: nginx:alpine
    container_name: llmproxy-dashboard
    ports:
      - "${DASHBOARD_PORT_MAPPING:-3000:80}"
    volumes:
      - ./dashboard/public:/usr/share/nginx/html:ro
    networks:
      - llmproxy-net
    restart: unless-stopped
    depends_on:
      - llmproxy

  # ============================================================================
  # DEV PROFILE (Additional development tools)
  # docker compose --profile dev up -d
  # ============================================================================
  
  redis:
    profiles: ["dev"]
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "${REDIS_PORT_MAPPING:-6379:6379}"
    volumes:
      - redis-data:/data
    networks:
      - llmproxy-net
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  llmproxy-net:
    driver: bridge

volumes:
  ollama:
    driver: local
  proxy-data:
    driver: local
  searxng-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
